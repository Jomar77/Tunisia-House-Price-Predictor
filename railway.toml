[build]
# Railway builds the backend Docker image at the repo root.
# The React/Vite frontend is deployed separately to Vercel.
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile CMD for startup so ${PORT} is expanded by the shell.
# Platform-level liveness probe (does not require model to be loaded yet)
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
# 5 retries is sufficient: model artifacts are loaded from the filesystem
# during startup (no external network call), so a genuine crash is
# unlikely to self-heal after more attempts.  Keeping this low avoids
# crash-looping a broken image indefinitely.
