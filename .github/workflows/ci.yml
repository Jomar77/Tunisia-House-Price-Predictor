name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions for all jobs — individual jobs do not need more than read.
permissions:
  contents: read

jobs:
  # ── Backend: lint + tests ──────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest

  # ── Frontend: lint + build check ──────────────────────────────────────────
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

